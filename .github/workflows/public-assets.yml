name: Public Assets

on:
  push:
  pull_request:

jobs:
  public-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify expected public assets exist
        run: |
          test -f public/next.svg
          test -f public/vercel.svg
          test -f public/globe.svg
          test -f public/window.svg
          test -f public/file.svg
